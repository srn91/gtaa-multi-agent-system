name: GTAA Paper Trading

on:
  schedule:
    # Run at 9:00 PM UTC every Sunday (monthly check)
    # Actual rebalance logic is inside the system — this just triggers
    - cron: '0 21 * * 0'
  workflow_dispatch:  # Manual trigger

env:
  APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
  APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
  DRY_RUN: "false"

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GTAA V4 Signal Pipeline
        run: python -m trading.live_v4

      - name: Save signal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-log-${{ github.run_number }}
          path: results/
          retention-days: 90
